<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Printmon 3</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg2: #111933;
      --panel: rgba(18, 26, 50, 0.92);
      --line: rgba(255,255,255,0.08);
      --text: #eef4ff;
      --muted: #9fb0d1;
      --accent: #ff9900;
      --accent2: #ffd27a;
      --good: #23c483;
      --warn: #ffb020;
      --bad: #ff6b6b;
      --radius: 18px;
      --shadow: 0 18px 50px rgba(0,0,0,0.32);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top right, rgba(255,153,0,0.14), transparent 28%),
        radial-gradient(circle at top left, rgba(35,196,131,0.07), transparent 26%),
        linear-gradient(180deg, #08101f, #0b1020 40%, #0c1325 100%);
      color: var(--text);
    }

    body { padding: 18px; }

    .shell { max-width: 1600px; margin: 0 auto; }

    .hero {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      padding: 18px 20px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255,153,0,0.10), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .brand .accent {
      color: var(--accent);
      text-shadow: 0 0 20px rgba(255,153,0,0.25);
    }

    .brand .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
      box-shadow: 0 0 12px rgba(255,176,32,0.45);
    }

    .dot.ok {
      background: var(--good);
      box-shadow: 0 0 12px rgba(35,196,131,0.45);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(330px, 430px) 1fr;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    .stack {
      display: grid;
      gap: 18px;
      margin-bottom: 18px;
    }

    .card {
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0));
    }

    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.01em;
    }

    .card-body { padding: 18px; }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="text"],
    input[type="number"],
    textarea {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    textarea:focus {
      border-color: rgba(255,153,0,0.55);
      box-shadow: 0 0 0 4px rgba(255,153,0,0.12);
    }

    textarea {
      min-height: 190px;
      resize: vertical;
      line-height: 1.45;
    }

    .row, .row-2 { display: grid; gap: 12px; }
    .row-2 { grid-template-columns: 1fr 1fr; }

    .checks {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
      color: var(--muted);
      font-size: 14px;
    }

    .check input { accent-color: var(--accent); }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 900;
      letter-spacing: 0.01em;
      cursor: pointer;
      color: #18233d;
      background: linear-gradient(180deg, var(--accent2), #ffb22e);
      box-shadow: 0 12px 25px rgba(255,153,0,0.18);
      transition: transform .12s ease, filter .12s ease, box-shadow .15s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 16px 30px rgba(255,153,0,0.22);
    }

    .btn:active { transform: translateY(0); }

    .btn.ghost {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .btn.small {
      padding: 8px 10px;
      border-radius: 10px;
      box-shadow: none;
      font-size: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .quick-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      grid-auto-rows: 8px;
      grid-auto-flow: row dense;
      gap: 12px;
      align-items: start;
    }

    .panel-block {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      overflow: hidden;
      align-self: start;
      height: fit-content;
    }

    .panel-block.is-wide {
      grid-column: span 2;
    }

    .panel-block h3 {
      margin: 0;
      padding: 11px 13px;
      font-size: 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.025);
    }

    .panel-block .inner { padding: 10px 12px; }

    .button-cloud {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
      gap: 8px;
      align-items: start;
    }

    .button-cloud .btn {
      width: 100%;
      min-width: 0;
      padding: 9px 11px;
      border-radius: 12px;
      box-shadow: none;
    }

    .child-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      align-items: start;
    }

    .child-block {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      background: rgba(255,255,255,0.025);
      min-width: 0;
      overflow: hidden;
      transition: border-color .12s ease, background .12s ease;
    }

    .child-block.is-open {
      border-color: rgba(255,153,0,0.18);
      background: rgba(255,255,255,0.035);
    }

    .child-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border: 0;
      background: transparent;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      text-align: left;
    }

    .child-toggle:hover {
      background: rgba(255,255,255,0.025);
    }

    .child-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .chevron {
      width: 9px;
      height: 9px;
      flex: 0 0 auto;
      border-right: 2px solid var(--muted);
      border-bottom: 2px solid var(--muted);
      transform: rotate(-45deg);
      transition: transform .16s ease, border-color .16s ease;
      margin-left: 2px;
    }

    .child-block.is-open .chevron {
      transform: rotate(45deg);
      border-color: var(--accent2);
    }

    .child-title {
      font-size: 12px;
      font-weight: 900;
      line-height: 1.2;
      letter-spacing: 0.02em;
    }

    .count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      padding: 4px 9px;
      border-radius: 999px;
      background: rgba(255,153,0,0.14);
      border: 1px solid rgba(255,153,0,0.18);
      color: #ffdca0;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
      flex: 0 0 auto;
    }

    .child-panel {
      display: none;
      padding: 0 10px 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    .child-block.is-open .child-panel {
      display: block;
      animation: panelIn .14s ease;
    }

    .child-panel .button-cloud {
      margin-top: 10px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 6px;
    }

    .child-panel .btn {
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      box-shadow: none;
    }

    @keyframes panelIn {
      from {
        opacity: 0;
        transform: translateY(-3px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .log-list {
      display: grid;
      gap: 10px;
      max-height: 360px;
      overflow: auto;
      padding-right: 4px;
    }

    .log-item {
      display: grid;
      grid-template-columns: auto minmax(0,1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.04);
      font-size: 13px;
    }

    .log-tag {
      font-size: 11px;
      font-weight: 900;
      padding: 5px 8px;
      border-radius: 999px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .log-tag.ok { background: rgba(35,196,131,.15); color: #7df2c6; }
    .log-tag.fail { background: rgba(255,107,107,.15); color: #ffc2c2; }
    .log-tag.preview { background: rgba(255,176,32,.12); color: #ffd78a; }
    .log-tag.idle { background: rgba(159,176,209,.12); color: #c9d6ee; }

    .log-meta {
      color: var(--muted);
      font-size: 12px;
    }

    .log-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .toast-wrap {
      position: fixed;
      right: 18px;
      bottom: 18px;
      display: grid;
      gap: 10px;
      z-index: 9999;
      width: min(420px, calc(100vw - 32px));
    }

    .toast {
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      background: rgba(14, 20, 35, 0.92);
      backdrop-filter: blur(10px);
      font-size: 14px;
      line-height: 1.45;
      transform: translateY(8px);
      opacity: 0;
      animation: toastIn .18s ease forwards;
    }

    .toast.ok { border-color: rgba(35,196,131,.25); }
    .toast.warn { border-color: rgba(255,176,32,.25); }
    .toast.bad { border-color: rgba(255,107,107,.25); }

    @keyframes toastIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 1180px) {
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 860px) {
      .quick-grid {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      }
    }

    @media (max-width: 720px) {
      body { padding: 14px; }
      .row-2 { grid-template-columns: 1fr; }
      .hero { padding: 16px; }
      .quick-grid {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
      }
      .panel-block,
      .panel-block.is-wide {
        grid-column: span 1;
        grid-row-end: auto !important;
      }
      .button-cloud { grid-template-columns: 1fr; }
      .log-item { grid-template-columns: 1fr; }
      .log-actions { justify-content: flex-start; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="brand">
        <h1><span class="accent">Printmon</span> 3</h1>
        <div class="sub">qjuflore</div>
      </div>
      <div class="hero-actions">
        <div class="pill">
          <span id="bridgeDot" class="dot"></span>
          <span id="bridgeState">Bridge idle</span>
        </div>
        <button class="btn ghost" type="button" id="testBridgeBtn">Test Bridge</button>
      </div>
    </section>

    <section class="layout">
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Custom Label Printer</h2>
        </div>
        <div class="card-body">
          <div class="checks">
            <label class="check"><input type="checkbox" id="printafter" checked> Print after scanning</label>
            <label class="check"><input type="checkbox" id="jumptoq"> Jump to quantity</label>
            <label class="check"><input type="checkbox" id="nowhitespace" checked> Trim whitespace</label>
            <label class="check"><input type="checkbox" id="previewMode"> Preview if bridge fails</label>
          </div>

          <div class="field">
            <label for="barcodedata">Barcode Data</label>
            <input id="barcodedata" maxlength="43" type="text" />
          </div>

          <div class="field">
            <label for="displaytext">Display Text</label>
            <input id="displaytext" maxlength="43" type="text" />
          </div>

          <div class="row-2">
            <div class="field">
              <label for="quantity">Quantity</label>
              <input id="quantity" type="number" min="1" max="500" value="1" />
            </div>
            <div class="field">
              <label for="bridgeUrl">Bridge URL</label>
              <input id="bridgeUrl" type="text" value="http://localhost:5965" />
            </div>
          </div>

          <div class="actions">
            <button class="btn" type="button" id="printLabelBtn">Print Label</button>
            <button class="btn ghost" type="button" id="clearFieldsBtn">Clear</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2 class="card-title">Quick Print Options</h2>
        </div>
        <div class="card-body">
          <div class="quick-grid" id="quickGrid"></div>
        </div>
      </div>
    </section>

    <section class="stack">
      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Item Quantity Sticker</h2>
        </div>
        <div class="card-body">
          <div class="field">
            <label for="quantitySticker">Quantity</label>
            <input id="quantitySticker" type="number" min="1" max="999" value="1" />
          </div>
          <div class="actions">
            <button class="btn" type="button" id="quantityStickerBtn">Print Quantity Sticker</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Multiple Labels</h2>
        </div>
        <div class="card-body">
          <div class="field">
            <label for="bulkQuantity">Quantity Each</label>
            <input id="bulkQuantity" type="number" min="1" max="500" value="1" />
          </div>
          <div class="field">
            <label for="textAreaID">One label per line</label>
            <textarea id="textAreaID"></textarea>
          </div>
          <div class="actions">
            <button class="btn" type="button" id="bulkPrintBtn">Print Multiple Labels</button>
            <button class="btn ghost" type="button" id="clearBulkBtn">Clear</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2 class="card-title">Activity Log</h2>
          <button class="btn ghost" type="button" id="clearLogBtn">Clear Log</button>
        </div>
        <div class="card-body">
          <div class="log-list" id="logList"></div>
        </div>
      </section>
    </section>
  </div>

    function showToast(message, type = 'ok', timeout = 3400) {

      node.textContent = message;

    function purgeLegacyIdentityData() {
      for (const key of LEGACY_KEYS_TO_CLEAR) {
        localStorage.removeItem(key);
      }

    function readPrefs() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEYS.prefs) || '{}');
      } catch {
        return {};
      }
    }

    function savePrefs() {
      const prefs = {
        printafter: $('printafter').checked,
        jumptoq: $('jumptoq').checked,
        nowhitespace: $('nowhitespace').checked,
        previewMode: $('previewMode').checked,
        bridgeUrl: $('bridgeUrl').value.trim(),
        bulkQuantity: $('bulkQuantity').value.trim()
      };
      localStorage.setItem(STORAGE_KEYS.prefs, JSON.stringify(prefs));
    }

    function applyPrefs() {
      const prefs = readPrefs();
      if (typeof prefs.printafter === 'boolean') $('printafter').checked = prefs.printafter;
      if (typeof prefs.jumptoq === 'boolean') $('jumptoq').checked = prefs.jumptoq;
      if (typeof prefs.nowhitespace === 'boolean') $('nowhitespace').checked = prefs.nowhitespace;
      if (typeof prefs.previewMode === 'boolean') $('previewMode').checked = prefs.previewMode;
      if (prefs.bridgeUrl) $('bridgeUrl').value = prefs.bridgeUrl;
      if (prefs.bulkQuantity) $('bulkQuantity').value = prefs.bulkQuantity;
    }

    function readLog() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEYS.log) || '[]');
      } catch {
        return [];
      }
    }

    function writeLog(items) {
      localStorage.setItem(STORAGE_KEYS.log, JSON.stringify(items.slice(0, 150)));
    }

    function makeLogEntry(type, text, detail = '', reprint = null) {
      return {
        id: `${Date.now()}-${Math.floor(Math.random() * 100000)}`,
        type,
        text,
        detail,
        time: new Date().toLocaleString(),
        reprint
      };
    }

    function addLog(type, text, detail = '', reprint = null) {
      const items = readLog();
      items.unshift(makeLogEntry(type, text, detail, reprint));
      writeLog(items);
      renderLog();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderLog() {
      const list = $('logList');
      const items = readLog();

      if (!items.length) {
        list.innerHTML = '<div class="log-item"><span class="log-tag idle">idle</span><div><div>No activity</div><div class="log-meta">Ready</div></div><div class="log-actions"></div></div>';
        return;
      }

      list.innerHTML = items.map(item => {
        const actionHtml = item.reprint
          ? `<div class="log-actions"><button class="btn ghost small" type="button" data-reprint-id="${escapeHtml(item.id)}">Print Again</button></div>`
          : '<div class="log-actions"></div>';
        return `
          <div class="log-item">
            <span class="log-tag ${escapeHtml(item.type)}">${escapeHtml(item.type)}</span>
            <div>
              <div>${escapeHtml(item.text)}</div>
              ${item.detail ? `<div class="log-meta">${escapeHtml(item.detail)}</div>` : ''}
              <div class="log-meta">${escapeHtml(item.time)}</div>
            </div>
            ${actionHtml}
          </div>
        `;
      }).join('');

      list.querySelectorAll('[data-reprint-id]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-reprint-id');
          const item = readLog().find(entry => entry.id === id);
          if (!item || !item.reprint) {
            showToast('Reprint data not available.', 'bad');
            return;
          }
          try {
            const result = await sendPrint(item.reprint.data, item.reprint.text, item.reprint.quantity, item.reprint.label, true);
            showToast(result.preview ? `Preview: ${item.reprint.label}` : `Printed again: ${item.reprint.label}`, result.preview ? 'warn' : 'ok');
          } catch (err) {
            showToast(err.message, 'bad', 4200);
          }
        });
      });
    }

    function genId() {
      let id = '';
      for (let i = 0; i < 10; i++) id += Math.floor(Math.random() * 10);
      return id;
    }

    function asciiHex(str) {
      let text = '';
      for (let i = 0; i < str.length; i++) {
        text += Number(str.charCodeAt(i)).toString(16);
      }
      return text;
    }

    function trimPair(a, b) {
      if ($('nowhitespace').checked) {
        return [String(a).trim(), String(b).trim()];
      }
      return [String(a), String(b)];
    }

    function getQuantity(id = 'quantity', max = 500) {
      const value = Number(($(id).value || '').trim());
      if (!Number.isFinite(value) || value < 1 || value > max) {
        throw new Error(`Quantity must be between 1 and ${max}.`);
      }
      return value;
    }

    function buildPrintUrl(data, text, quantity) {
      const bridgeUrl = ($('bridgeUrl').value || '').trim().replace(/\/$/, '');
      return `${bridgeUrl}/printer?action=print&type=barcode&data=${asciiHex(data)}&text=${asciiHex(text)}&quantity=${quantity}&badgeid=&seq=${genId()}`;
    }

    function setBridgeUi(stateText, ok = false) {
      $('bridgeState').textContent = stateText;
      $('bridgeDot').classList.toggle('ok', !!ok);
    }

    function requestText(url) {
      return new Promise((resolve, reject) => {
        try {
          const xhr = new XMLHttpRequest();
          xhr.open('GET', url, true);
          xhr.timeout = 10000;
          xhr.onreadystatechange = function () {
            if (xhr.readyState !== 4) return;
            resolve({
              status: xhr.status,
              text: xhr.responseText || ''
            });
          };
          xhr.onerror = function () {
            reject(new Error('Could not reach the print bridge.'));
          };
          xhr.ontimeout = function () {
            reject(new Error('Print bridge timed out.'));
          };
          xhr.send();
        } catch (err) {
          reject(err);
        }
      });
    }

    function isSuccessfulResponse(result) {
      const text = (result.text || '').trim().toLowerCase();
      if (result.status >= 200 && result.status < 300) {
        if (!text) return true;
        if (text === 'valid' || text === 'ok' || text === 'success' || text === 'printed') return true;
        if (text.includes('invalid') || text.includes('error') || text.includes('failed')) return false;
        return true;
      }
      return false;
    }

    async function pingBridge() {
      savePrefs();
      try {
        const url = ($('bridgeUrl').value || '').trim().replace(/\/$/, '') + '/';
        const result = await requestText(url);
        const ok = result.status > 0 && result.status < 500;
        setBridgeUi(ok ? `Bridge ${result.status}` : 'Bridge unavailable', ok);
        addLog(ok ? 'ok' : 'fail', 'Bridge test', `${result.status}`);
        showToast(ok ? `Bridge responded: ${result.status}` : 'Bridge unavailable', ok ? 'ok' : 'bad');
        return ok;
      } catch (err) {
        setBridgeUi('Bridge unavailable', false);
        addLog('fail', 'Bridge test failed', err.message);
        showToast(err.message, 'bad', 4200);
        return false;
      }
    }

    async function sendPrint(data, text, quantity, labelForLog, isReprint = false) {
      savePrefs();
      const reprint = {
        data,
        text,
        quantity,
        label: labelForLog
      };

      try {
        const result = await requestText(buildPrintUrl(data, text, quantity));
        if (!isSuccessfulResponse(result)) {
          throw new Error((result.text || `Bridge responded with status ${result.status}`).trim());
        }
        setBridgeUi('Bridge active', true);
        addLog('ok', isReprint ? `Printed again: ${labelForLog}` : `Printed: ${labelForLog}`, `${quantity} copy/copies`, reprint);
        return { ok: true, preview: false };
      } catch (err) {
        setBridgeUi('Bridge unavailable', false);
        if ($('previewMode').checked) {
          addLog('preview', isReprint ? `Preview again: ${labelForLog}` : `Preview: ${labelForLog}`, err.message, reprint);
          return { ok: true, preview: true, error: err.message };
        }
        addLog('fail', isReprint ? `Reprint failed: ${labelForLog}` : `Print failed: ${labelForLog}`, err.message, reprint);
        throw err;
      }
    }

    async function printSticker(printString, quantityOverride = null) {
      const qty = quantityOverride ?? getQuantity('quantity', 500);
      const trimmed = trimPair(printString, printString);
      return sendPrint(trimmed[0], trimmed[1], qty, trimmed[1] || trimmed[0]);
    }

    function lpnReprintBlocked(barcode) {
      const hasLpnAt0 = barcode.includes('LPN', 0);
      const confirm = Number(barcode.includes('LPN', 1)) + Number(barcode.includes('LPN', 2)) + Number(barcode.includes('LPN', 3));
      return hasLpnAt0 && confirm < 1;
    }

    async function printLabel() {
      try {
        let barcode = $('barcodedata').value || '';
        let text = $('displaytext').value || '';
        if (!barcode.trim()) throw new Error('Please enter barcode data.');
        if (lpnReprintBlocked(barcode)) throw new Error('Reprinting of LPN stickers is not allowed.');
        const trimmed = trimPair(barcode, text);
        barcode = trimmed[0];
        text = trimmed[1];
        const qty = getQuantity('quantity', 500);
        const result = await sendPrint(barcode, text, qty, text || barcode);
        $('barcodedata').focus();
        $('barcodedata').select();
        showToast(result.preview ? `Preview: ${text || barcode}` : `Printed: ${text || barcode}`, result.preview ? 'warn' : 'ok');
      } catch (err) {
        showToast(err.message, 'bad', 4200);
      }
    }

    async function printQuantitySticker() {
      try {
        const amount = Number(($('quantitySticker').value || '').trim());
        if (!Number.isFinite(amount) || amount < 1 || amount > 999) {
          throw new Error('Enter a valid quantity.');
        }
        const text = `Quantity ${amount}`;
        const result = await printSticker(text);
        showToast(result.preview ? `Preview: ${text}` : `Printed: ${text}`, result.preview ? 'warn' : 'ok');
      } catch (err) {
        showToast(err.message, 'bad');
      }
    }

    async function printBulk() {
      const raw = $('textAreaID').value || '';
      const lines = raw.split(/\r?\n/).map(v => v.trim()).filter(Boolean);

      if (!lines.length) {
        showToast('Add at least one label.', 'bad');
        return;
      }

      let qty;
      try {
        qty = getQuantity('bulkQuantity', 500);
      } catch (err) {
        showToast(err.message, 'bad');
        return;
      }

      let printed = 0;
      let preview = 0;
      const failed = [];

      for (const line of lines) {
        try {
          const result = await printSticker(line, qty);
          if (result.preview) preview += 1;
          else printed += 1;
        } catch (err) {
          failed.push(line);
        }
      }

      $('textAreaID').value = failed.join('\n');

      if (failed.length) {
        showToast(`Done: ${printed} printed, ${preview} preview, ${failed.length} failed.`, failed.length && (printed || preview) ? 'warn' : 'bad', 5200);
        return;
      }

      showToast(preview ? `Done: ${preview} preview label(s).` : `Printed ${printed} label(s).`, preview ? 'warn' : 'ok', 4200);
    }

      if (document.activeElement === $('quantity') && $('jumptoq').checked && $('printafter').checked) {
        e.preventDefault();
        printLabel();
        setTimeout(() => {
          $('barcodedata').focus();
          $('barcodedata').select();
        }, 10);
      }
    }

    let quickGridResizeTimer = 0;

    function fitQuickGrid() {
      const host = $('quickGrid');
      if (!host) return;

      const styles = getComputedStyle(host);
      const autoRow = parseFloat(styles.gridAutoRows);
      const rowGap = parseFloat(styles.rowGap || styles.gap || 0);
      const stacked = window.matchMedia('(max-width: 720px)').matches || !Number.isFinite(autoRow) || autoRow <= 0;

      host.querySelectorAll('.panel-block').forEach(panel => {
        if (stacked) {
          panel.style.gridRowEnd = '';
          return;
        }

        panel.style.gridRowEnd = 'span 1';
        const height = panel.getBoundingClientRect().height;
        const span = Math.max(1, Math.ceil((height + rowGap) / (autoRow + rowGap)));
        panel.style.gridRowEnd = `span ${span}`;
      });
    }

    function queueQuickGridLayout() {
      clearTimeout(quickGridResizeTimer);
      quickGridResizeTimer = setTimeout(() => {
        requestAnimationFrame(fitQuickGrid);
      }, 40);
    }

    function renderQuickSections() {
      const host = $('quickGrid');
      host.innerHTML = quickSections.map(section => {
        const ownItemCount = Array.isArray(section.items) ? section.items.length : 0;
        const childCount = Array.isArray(section.children) ? section.children.length : 0;
        const totalButtonCount = ownItemCount + (Array.isArray(section.children)
          ? section.children.reduce((sum, child) => sum + (Array.isArray(child.items) ? child.items.length : 0), 0)
          : 0);
        const panelClass = section.wide || ownItemCount >= 10 || childCount >= 6 ? 'panel-block is-wide' : 'panel-block';

        const content = childCount
          ? `
            <div class="child-grid">
              ${section.children.map(child => {
                const childItems = Array.isArray(child.items) ? child.items : [];
                return `
                  <section class="child-block">
                    <button class="child-toggle" type="button" data-child-toggle aria-expanded="false">
                      <span class="child-meta">
                        <span class="chevron" aria-hidden="true"></span>
                        <span class="child-title">${escapeHtml(child.title)}</span>
                      </span>
                      <span class="count-badge">${childItems.length}</span>
                    </button>
                    <div class="child-panel">
                      <div class="button-cloud">
                        ${childItems.map(item => `<button class="btn" type="button" data-quick="${escapeHtml(item.label)}">${escapeHtml(item.label)}</button>`).join('')}
                      </div>
                    </div>
                  </section>
                `;
              }).join('')}
            </div>
          `
          : `
            <div class="button-cloud">
              ${section.items.map(item => `<button class="btn" type="button" data-quick="${escapeHtml(item.label)}">${escapeHtml(item.label)}</button>`).join('')}
            </div>
          `;

        return `
        <section class="${panelClass}" data-count="${totalButtonCount}">
          <h3>${escapeHtml(section.title)}</h3>
          <div class="inner">
            ${content}
          </div>
        </section>
      `;
      }).join('');

      const allQuickItems = quickSections.flatMap(section => [
        ...(Array.isArray(section.items) ? section.items : []),
        ...(Array.isArray(section.children)
          ? section.children.flatMap(child => Array.isArray(child.items) ? child.items : [])
          : [])
      ]);

      host.querySelectorAll('[data-child-toggle]').forEach(toggle => {
        toggle.addEventListener('click', () => {
          const block = toggle.closest('.child-block');
          const group = block && block.parentElement;
          if (!block || !group) return;

          const shouldOpen = !block.classList.contains('is-open');

          group.querySelectorAll('.child-block.is-open').forEach(openBlock => {
            openBlock.classList.remove('is-open');
            const openToggle = openBlock.querySelector('[data-child-toggle]');
            if (openToggle) openToggle.setAttribute('aria-expanded', 'false');
          });

          if (shouldOpen) {
            block.classList.add('is-open');
            toggle.setAttribute('aria-expanded', 'true');
          } else {
            block.classList.remove('is-open');
            toggle.setAttribute('aria-expanded', 'false');
          }

          queueQuickGridLayout();
        });
      });

      host.querySelectorAll('[data-quick]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const label = btn.getAttribute('data-quick');
          const item = allQuickItems.find(entry => entry.label === label);
          try {
            if (item && Array.isArray(item.multi)) {
              for (const part of item.multi) {
                await printSticker(part);
              }
              showToast(`Processed: ${label}`, 'ok');
            } else {
              const result = await printSticker(label);
              showToast(result.preview ? `Preview: ${label}` : `Printed: ${label}`, result.preview ? 'warn' : 'ok');
            }
          } catch (err) {
            showToast(err.message, 'bad', 4200);
          }
        });
      });

      queueQuickGridLayout();
    }

    function bindUi() {
      document.addEventListener('keydown', keyCheck, false);
      window.addEventListener('resize', queueQuickGridLayout, { passive: true });
      window.addEventListener('load', queueQuickGridLayout, { once: true });

      ['printafter', 'jumptoq', 'nowhitespace', 'previewMode', 'bridgeUrl', 'bulkQuantity'].forEach(id => {
        $(id).addEventListener('change', savePrefs);
        $(id).addEventListener('input', savePrefs);
      });

      $('printLabelBtn').addEventListener('click', printLabel);
      $('clearFieldsBtn').addEventListener('click', () => {
        $('barcodedata').value = '';
        $('displaytext').value = '';
        $('quantity').value = '1';
        $('barcodedata').focus();
      });

      $('testBridgeBtn').addEventListener('click', pingBridge);
      $('quantityStickerBtn').addEventListener('click', printQuantitySticker);
      $('bulkPrintBtn').addEventListener('click', printBulk);
      $('clearBulkBtn').addEventListener('click', () => $('textAreaID').value = '');
      $('clearLogBtn').addEventListener('click', () => {
        writeLog([]);
        renderLog();
        showToast('Activity log cleared.', 'ok');
      });
    }

    function init() {
      purgeLegacyIdentityData();
      applyPrefs();
      renderQuickSections();
      bindUi();
      renderLog();
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(queueQuickGridLayout).catch(() => {});
      }
      $('barcodedata').focus();
    }

    init();
  </script>
</body>
</html>
